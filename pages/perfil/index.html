<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./css/perfil.css">
    <title>Perfil</title>
</head>
<body>
  <div class="background"></div>


    <div class="fundo-usuario">
    <header class="minhas-viagens">
        <nav><a href="../../pages/minhasviagens/index.html">Minhas Viagens</a></nav>
    </header>
      </div>
   
    <div class="back">
    <div class="Perfil-Usuario">
        <img src="../../assets/images/Ellipse-20.svg" alt="Foto do Usuário" class="img-user">
        <h1 class="titulo">Olá, (nome do usuário)</h1>
    </div>
    </div>
  
    <form class="form-cadastro">
        <h2 class="titulo-dados">Dados Cadastrais</h2>
        <div class="form-container">
            <div class="coluna-esquerda">
            <input type="text"
            id="nome"
            name="nome"
            placeholder="Nome Completo"
            required>

            <input type="text"
            id="Data Nascimento"
            name="Data Nascimento"
            placeholder="Data de nascimento"
            required> 

            <input type="text"
            id="Email"
            name="Email"
            placeholder="Email"
            required>
            </div>

            <div class="coluna-direita">
            <input type="text"
            id="CPF"
            name="CPF"
            placeholder="CPF"
            required>

            <input type="text"
            id="Telefone"
            name="Telefone"
            placeholder="Telefone"
            required>

            <input type="text"
            id="Senha"
            name="Senha"
            placeholder="Senha"
            required>
        </div>
        
        <div class="caixa-botão">
        <button class="bnt-salvar" type="submit">Salvar as Alterações</button>
        </div>
        
        </div>
    </form>
    </div>
    </div>
</body>
</html>
