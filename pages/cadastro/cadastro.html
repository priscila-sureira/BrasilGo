<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="../cadastro/css/cadastro.css" />
    <title>Document</title>
  </head>
  <body>
    <header class="logo">
      <img src="/assets/images/Logo.png" alt="logoBrasilGO" />
    </header>
    <div class="container-cadastro">
      <div class="cadastro">
        <h1 class="bemvindo">Bem-vindo á sua próxima viagem!</h1>
        <form class="form" action="">
          <div class="input-login">
            <label class="label" for="informe"
              >Informe um email, CPF ou número de telefone</label
            >
            <input type="text" placeholder="" required />
          </div>
          <div class="input-login">
            <label class="label" for="senha">Crie uma senha</label>
            <input type="password" placeholder="" required />
          </div>
          <div class="botoes">
            <button class="botao" type="submit">Criar conta</button>
            <button class="botaodois" type="voltar">Voltar ao Login</button>
          </div>
        </form>
      </div>
    </div>
  </body>
</html>
