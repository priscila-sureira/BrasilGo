<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Origem</title>
    <link rel="stylesheet" href="./css/style.css" />
  </head>
  <body>
    <header class="container">
      <div class="header">
        <img src="/assets/images/Logo.png" alt="" />

        <div class="steps">
          <ul class="lista">
            <li>
              <h3><span>1 </span> Tipo de viagem</h3>
            </li>
            <li>
              <h3 class="origem"><span>2</span> Origem</h3>
            </li>
            <li>
              <h3><span>3</span> Destinos</h3>
            </li>
            <li>
              <h3><span>4</span> Datas</h3>
            </li>
            <li>
              <h3><span>5</span> Passageiros</h3>
            </li>
          </ul>
        </div>

        <div class="user">
          <img src="/assets/images/Ellipse-20.svg" alt="" />
          <span>Minhas viagens</span>
        </div>
      </div>
    </header>

    <main class="container">
      <div class="background">
        <div class="card">
          <h1 class="texto">De onde você vai sair?</h1>

          <div class="input-group">
            <input type="text" placeholder="Digite a cidade aqui..." />
            <span></span>
          </div>

          <div class="buttons">
            <button class="btn">Voltar</button>
            <button class="btn">Continuar</button>
          </div>
        </div>
      </div>
    </main>
  </body>
</html>
